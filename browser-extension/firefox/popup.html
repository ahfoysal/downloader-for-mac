<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Downloader for Mac</title>
  <style>
    :root {
      --bg: #0e0e10;
      --panel: #17171b;
      --panel-2: #1e1e23;
      --border: #2a2a31;
      --text: #e8e8ea;
      --muted: #9a9aa3;
      --accent: #03dac6;
    }
    body {
      margin: 0;
      padding: 14px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 340px;
      min-height: 180px;
    }
    h1 {
      font-size: 13px;
      margin: 0 0 4px;
      font-weight: 700;
    }
    .sub {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .tab-title {
      font-size: 11px;
      color: var(--muted);
      background: var(--panel-2);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    button {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 9px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 6px;
    }
    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 11px;
      margin-bottom: 6px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    .status {
      color: var(--accent);
      font-size: 10px;
      text-align: center;
      min-height: 12px;
      margin-top: 4px;
    }
    .section-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 14px 0 6px;
    }
    .media-list {
      max-height: 140px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px;
    }
    .media-item {
      display: flex;
      align-items: center;
      padding: 5px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      gap: 6px;
    }
    .media-item:hover { background: var(--panel-2); }
    .media-item .url {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }
    .media-item input[type="checkbox"] { accent-color: var(--accent); }
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      padding: 14px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      padding: 6px 8px;
      background: var(--panel-2);
      border-radius: 6px;
    }
    .toggle-row input { width: auto; margin: 0; accent-color: var(--accent); }
    .kbd-hint {
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    kbd {
      background: var(--panel-2);
      border: 1px solid var(--border);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 9px;
    }
    .count-badge {
      display: inline-block;
      background: var(--accent);
      color: #000;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <h1>Downloader for Mac</h1>
  <div class="sub">Current tab →</div>
  <div class="tab-title" id="tabTitle">Loading…</div>
  <button id="sendCurrent">Send this page</button>

  <div class="section-label">Detected media <span class="count-badge" id="mediaCount" style="display:none;">0</span></div>
  <div id="mediaContainer">
    <div class="empty">No media detected on this page.</div>
  </div>
  <button class="secondary" id="sendSelected" style="display:none;margin-top:6px;">Send selected</button>

  <div class="section-label">Paste URL</div>
  <input id="manualUrl" type="text" placeholder="https://…" spellcheck="false" />
  <button class="secondary" id="sendManual">Send pasted</button>

  <img id="thumb" style="display:none;width:100%;border-radius:6px;margin-bottom:6px;max-height:120px;object-fit:cover;" />

  <div class="toggle-row">
    <input type="checkbox" id="autoSendToggle" />
    <label for="autoSendToggle" style="flex:1;cursor:pointer;">Auto-send on supported video pages</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="interceptToggle" />
    <label for="interceptToggle" style="flex:1;cursor:pointer;">Intercept browser downloads</label>
  </div>

  <div class="status" id="status"></div>

  <div class="kbd-hint">
    <kbd>⌘⇧D</kbd> sends current tab from anywhere.<br>
    Right-click pages / links / videos for more options.
  </div>

  <script src="popup.js"></script>
</body>
</html>
