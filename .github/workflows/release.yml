name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Fetch binaries (yt-dlp + ffmpeg)
        run: node scripts/fetch-binaries.js
      - name: Build mac (arm64)
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            dist/*.dmg
            dist/*-mac.zip
            dist/latest-mac.yml

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Fetch yt-dlp.exe
        shell: pwsh
        run: |
          mkdir bin -ErrorAction SilentlyContinue
          Invoke-WebRequest -Uri 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe' -OutFile bin/yt-dlp.exe
      - name: Fetch ffmpeg.exe
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip' -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extract
          Get-ChildItem -Path ffmpeg-extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName bin/ffmpeg.exe }
      - name: Build Windows
        run: npm run dist
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mac-arm64/*
            dist/windows/*
          generate_release_notes: true
          draft: false
          prerelease: false
